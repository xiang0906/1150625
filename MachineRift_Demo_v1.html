<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Rift v1.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#b0c2d2,#bccadb);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Share Tech Mono','Courier New',monospace;color:#0a3a55;overflow:hidden;}
#gameWrapper{position:relative;display:flex;flex-direction:column;align-items:center;}
#gameCanvas{display:block;cursor:crosshair;border:1px solid #aaccdd;border-radius:8px 8px 0 0;box-shadow:0 8px 40px rgba(0,100,160,0.18),0 2px 8px rgba(0,80,130,0.1);}
#toolbar{display:flex;flex-direction:column;padding:0;background:linear-gradient(180deg,#d8e2ec,#c8d4e0);border:1px solid #bcd4e2;border-top:none;border-radius:0 0 8px 8px;width:100%;box-shadow:0 4px 16px rgba(0,90,140,0.1);}
#toolbarHint{font-size:10px;color:#3a7a9a;padding:4px 12px;border-bottom:1px solid #cfe0ea;letter-spacing:1px;min-height:20px;display:flex;align-items:center;background:rgba(0,150,210,0.04);}
#toolbarMain{display:flex;align-items:center;padding:5px 8px;gap:0;}
.tb-group{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.tb-divider{width:1px;height:22px;background:#bcd4e2;margin:0 10px;flex-shrink:0;}
.tb-spacer{flex:1;}
.tower-btn:active,#waveBtn:active,#sellBtn:active,#upgradeBtn:active,#soundBtn:active,#pauseBtn:active{transform:translateY(0);transition:transform 0.05s;}
.tower-btn{background:linear-gradient(135deg,#ffffff,#eef5fa);border:1px solid #99c4dd;color:#0077aa;padding:5px 13px;cursor:pointer;font-family:'Share Tech Mono','Courier New',monospace;font-size:11px;transition:all 0.2s;white-space:nowrap;position:relative;overflow:hidden;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.tower-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#00aadd33,transparent);transition:left 0.4s;}
.tower-btn:hover::before{left:100%;}
.tower-btn:hover{border-color:#0088cc;background:linear-gradient(135deg,#e4f3fb,#d4ebf6);box-shadow:0 4px 14px rgba(0,140,200,0.35);transform:translateY(-2px);}
.tower-btn.selected{background:linear-gradient(135deg,#00aadd,#0088cc);border-color:#0077aa;color:#fff;box-shadow:0 2px 14px rgba(0,150,210,0.4);}
.tower-btn.fire-btn{border-color:#ffb088;color:#dd5500;}
.tower-btn.fire-btn:hover{border-color:#ee5500;background:linear-gradient(135deg,#fff0e4,#ffe2cc);box-shadow:0 4px 14px rgba(255,100,0,0.35);transform:translateY(-2px);}
.tower-btn.fire-btn.selected{background:linear-gradient(135deg,#ff8833,#ee6600);border-color:#dd5500;color:#fff;box-shadow:0 2px 14px rgba(255,100,0,0.4);}
.tower-btn.ice-btn{border-color:#99ccf5;color:#0088dd;}
.tower-btn.ice-btn:hover{border-color:#2288dd;background:linear-gradient(135deg,#e4f0fb,#d2e6f8);box-shadow:0 4px 14px rgba(50,150,238,0.35);transform:translateY(-2px);}
.tower-btn.ice-btn.selected{background:linear-gradient(135deg,#55aaf5,#3388dd);border-color:#2277cc;color:#fff;box-shadow:0 2px 14px rgba(50,150,238,0.4);}
#waveBtn{margin-left:auto;background:linear-gradient(135deg,#22cc66,#11aa55);border:1px solid #0a9944;color:#fff;padding:5px 16px;cursor:pointer;font-family:'Share Tech Mono','Courier New',monospace;font-size:11px;transition:all 0.2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
#waveBtn:hover{border-color:#0a9944;box-shadow:0 4px 18px rgba(20,180,80,0.5);transform:translateY(-2px);filter:brightness(1.08);}
#waveBtn:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
#sellBtn{background:linear-gradient(135deg,#ffeeee,#ffdddd);border:1px solid #ee9999;color:#cc3333;padding:5px 13px;cursor:pointer;font-family:'Share Tech Mono','Courier New',monospace;font-size:11px;display:none;transition:all 0.2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
#sellBtn:hover{border-color:#cc2222;background:linear-gradient(135deg,#ffe0e0,#ffcccc);box-shadow:0 4px 14px rgba(220,50,50,0.35);transform:translateY(-2px);}
#upgradeBtn{background:linear-gradient(135deg,#eefadd,#ddf5cc);border:1px solid #99dd66;color:#449911;padding:5px 13px;cursor:pointer;font-family:'Share Tech Mono','Courier New',monospace;font-size:11px;display:none;transition:all 0.2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
#upgradeBtn:hover{border-color:#44aa11;background:linear-gradient(135deg,#e6f7d6,#d6f0c0);box-shadow:0 4px 14px rgba(90,180,30,0.35);transform:translateY(-2px);}
#soundBtn{background:linear-gradient(135deg,#f0eeff,#e6e0fa);border:1px solid #b8a8ee;color:#7755cc;padding:5px 12px;cursor:pointer;font-family:'Share Tech Mono','Courier New',monospace;font-size:11px;transition:all 0.2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);white-space:nowrap;}
#soundBtn:hover{border-color:#7755cc;background:linear-gradient(135deg,#ece6fb,#ddd0f5);box-shadow:0 4px 14px rgba(120,85,205,0.35);transform:translateY(-2px);}
#pauseBtn{background:linear-gradient(135deg,#fffadd,#fff3cc);border:1px solid #e6c84d;color:#aa8800;padding:5px 12px;cursor:pointer;font-family:'Share Tech Mono','Courier New',monospace;font-size:11px;transition:all 0.2s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);white-space:nowrap;}
#pauseBtn:hover{border-color:#cc9900;background:linear-gradient(135deg,#fff6dd,#ffeec0);box-shadow:0 4px 14px rgba(220,170,0,0.4);transform:translateY(-2px);}
#pauseBtn.paused{background:linear-gradient(135deg,#ddf5e6,#ccf0dd);border-color:#22bb66;color:#0a9944;}
#pauseBtn.paused:hover{border-color:#0a9944;box-shadow:0 4px 14px rgba(20,180,80,0.4);transform:translateY(-2px);}
#pauseOverlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(220,230,240,0.96),rgba(206,220,234,0.94));backdrop-filter:blur(3px);z-index:15;}
#pauseOverlay::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.01) 2px,rgba(0,229,255,0.01) 4px);pointer-events:none;}
#pauseOverlay h2{font-size:36px;letter-spacing:8px;color:#cc9900;text-shadow:0 2px 12px rgba(200,150,0,0.3);margin-bottom:8px;}
#pauseOverlay .p-sub{font-size:11px;color:#bb9933;letter-spacing:4px;margin-bottom:36px;}
#pauseOverlay .p-stats{display:flex;gap:32px;margin-bottom:32px;font-size:12px;}
#pauseOverlay .p-stat{text-align:center;}
#pauseOverlay .p-stat-val{font-size:22px;font-weight:bold;color:#0a3a55;display:block;margin-top:4px;}
#pauseOverlay .p-stat-lbl{color:#3a6a85;font-size:10px;letter-spacing:2px;}
#confirmQuit{display:none;flex-direction:column;align-items:center;margin-top:8px;}
#confirmQuit .q-msg{font-size:12px;color:#ff444488;letter-spacing:2px;margin-bottom:12px;}
#confirmQuit .q-btns{display:flex;gap:10px;}
/* Wave event banner */
#waveEventBanner{position:absolute;top:42px;left:50%;transform:translateX(-50%);display:none;z-index:8;text-align:center;pointer-events:none;animation:bannerIn 0.4s ease-out forwards;}
@keyframes bannerIn{0%{opacity:0;transform:translateX(-50%) translateY(-10px);}100%{opacity:1;transform:translateX(-50%) translateY(0);}}
#waveEventBanner .ev-title{font-size:13px;letter-spacing:3px;padding:5px 22px;border:1px solid #ff880088;color:#ff8800;background:linear-gradient(135deg,rgba(10,18,32,0.95),rgba(20,12,0,0.9));clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);text-shadow:0 0 12px #ff880088;}
#waveEventBanner .ev-desc{font-size:10px;color:#cc6600;letter-spacing:2px;margin-top:3px;}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(190,206,222,0.95),rgba(172,190,210,0.94));backdrop-filter:blur(3px);z-index:10;}
.overlay::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,130,190,0.018) 2px,rgba(0,130,190,0.018) 4px);pointer-events:none;animation:sc 8s linear infinite;}
@keyframes sc{0%{background-position:0 0}100%{background-position:0 200px}}
.overlay h1{font-size:52px;letter-spacing:10px;text-transform:uppercase;color:#005580;text-shadow:0 2px 16px rgba(0,100,150,0.3),0 0 30px rgba(0,140,200,0.2);margin-bottom:6px;line-height:1.1;text-align:center;animation:glitch 5s infinite;}
@keyframes glitch{0%,94%,100%{text-shadow:0 2px 16px rgba(0,100,150,0.3),0 0 30px rgba(0,140,200,0.2);}95%{text-shadow:2px 0 #ee4488aa,-2px 0 #0099ccaa,0 2px 16px rgba(0,100,150,0.3);}97%{text-shadow:-2px 0 #ee4488aa,2px 0 #0099ccaa,0 2px 16px rgba(0,100,150,0.3);}}
.overlay .subtitle{font-size:11px;color:#3a6a85;letter-spacing:5px;margin-bottom:28px;text-transform:uppercase;}
.overlay-btn{background:linear-gradient(135deg,#ffffff,#eef6fb);border:1px solid #0088bb;color:#005580;padding:11px 36px;cursor:pointer;font-family:'Share Tech Mono','Courier New',monospace;font-size:13px;letter-spacing:3px;transition:all 0.25s;margin:5px;position:relative;overflow:hidden;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);}
.overlay-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#00e5ff33,transparent);transition:left 0.5s;}
.overlay-btn:hover::before{left:100%;}
.overlay-btn:hover{background:#00e5ff1e;box-shadow:0 0 30px #00e5ff22;}
.overlay .legend{display:grid;grid-template-columns:1fr 1fr;gap:6px 28px;margin:16px 0 26px;font-size:11px;color:#00e5ff77;text-align:left;border:1px solid #00e5ff28;padding:12px 16px;}
#victoryOverlay h1{color:#11aa55;text-shadow:0 2px 16px rgba(20,180,90,0.35);}
#victoryOverlay .overlay-btn{border-color:#11aa55;color:#0a9944;}
#victoryOverlay .overlay-btn:hover{background:#00ff8810;}
#gameoverOverlay h1{color:#dd3344;text-shadow:0 2px 16px rgba(220,50,70,0.35);}
#gameoverOverlay .overlay-btn{border-color:#dd3344;color:#cc2233;}
#gameoverOverlay .overlay-btn:hover{background:linear-gradient(135deg,#ee4455,#dd3344);color:#fff;box-shadow:0 4px 20px rgba(220,50,70,0.35);}
.score-display{font-size:20px;color:#0a3a55;margin:8px 0 18px;letter-spacing:3px;}
#tutOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(220,230,240,0.98),rgba(206,220,234,0.97));z-index:20;display:none;flex-direction:column;align-items:stretch;overflow:hidden;}
#tutHeader{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;border-bottom:1px solid #00e5ff33;flex-shrink:0;background:linear-gradient(90deg,#00e5ff06,transparent);}
#tutHeader h2{font-size:11px;letter-spacing:4px;color:#3a6a85;}
#tutClose{background:#ffffff;border:1px solid #88bbd5;color:#005580;padding:3px 12px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);transition:all 0.2s;}
#tutClose:hover{background:#00e5ff10;border-color:#00e5ff88;}
#tutNav{display:flex;align-items:center;gap:5px;padding:8px 18px;border-bottom:1px solid #cfe0ea;flex-shrink:0;flex-wrap:wrap;}
.tut-dot{width:26px;height:26px;border-radius:50%;border:1px solid #99bbd2;color:#3a6a85;background:#ffffff;font-size:10px;font-family:'Share Tech Mono',monospace;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.tut-dot.active{background:#00e5ff28;border-color:#00e5ff;color:#00e5ff;box-shadow:0 0 8px #00e5ff33;}
.tut-dot.done{background:#00ff4425;border-color:#00ff4455;color:#00ff44;}
.tut-line{flex:1;height:1px;background:linear-gradient(90deg,#aaccdd,transparent);min-width:6px;}
#tutBody{flex:1;overflow-y:auto;padding:14px 18px;}
#tutBody::-webkit-scrollbar{width:3px;}
#tutBody::-webkit-scrollbar-thumb{background:#00e5ff33;border-radius:2px;}
.tut-card{background:linear-gradient(135deg,#ffffff,#f2f8fc);border:1px solid #bcd8e8;padding:12px 14px;margin-bottom:8px;}
.tut-step-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.tut-step-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#cceaf5,#e6f4fb);border:1px solid #99cce0;color:#0077aa;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.tut-step-title{font-size:13px;color:#006699;margin:0 0 2px;letter-spacing:1px;}
.tut-step-sub{font-size:10px;color:#4a7a95;margin:0;}
.tut-body{font-size:11px;color:#446677;line-height:1.8;margin:0 0 8px;}
.tut-tip{background:linear-gradient(135deg,#e6f4fb,#daeef8);border:1px solid #acd8ec;border-left:2px solid #0099cc;padding:5px 9px;font-size:10px;color:#0077aa;margin-top:5px;}
.tut-warn{background:linear-gradient(135deg,#fff4e6,#ffedda);border:1px solid #ffcc99;border-left:2px solid #ee8800;padding:5px 9px;font-size:10px;color:#cc6600;margin-top:5px;}
.tut-grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0;}
.tut-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:6px 0;}
.tut-box{background:linear-gradient(135deg,#ffffff,#f0f6fa);border:1px solid #cfe2ec;padding:7px 9px;}
.tut-box-title{font-size:11px;font-weight:bold;margin:0 0 4px;}
.tut-box-sub{font-size:10px;color:#446677;margin:0;line-height:1.5;}
.tut-bar-row{display:flex;align-items:center;gap:5px;margin:3px 0;font-size:10px;color:#446677;}
.tut-bar-bg{flex:1;height:2px;background:#cfe0ea;}
.tut-bar{height:2px;}
.tut-enemy-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #d5e5ee;}
.tut-enemy-row:last-child{border-bottom:none;}
.tut-badge{display:inline-block;padding:1px 6px;font-size:9px;}
.tut-wave-table{width:100%;border-collapse:collapse;font-size:10px;margin:5px 0;}
.tut-wave-table th{color:#3a6a85;padding:3px 5px;border-bottom:1px solid #00e5ff28;text-align:left;}
.tut-wave-table td{color:#446677;padding:4px 5px;border-bottom:1px solid #e0ecf3;}
.tut-wave-table tr:last-child td{border-bottom:none;}
#tutFooter{display:flex;gap:6px;padding:8px 18px;border-top:1px solid #cfe0ea;flex-shrink:0;background:linear-gradient(180deg,transparent,#00e5ff04);}
.tut-nav-btn{background:linear-gradient(135deg,#ffffff,#eef5fa);border:1px solid #88bbd5;color:#005580;padding:6px 16px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;transition:all 0.2s;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.tut-nav-btn:hover{border-color:#0099cc;box-shadow:0 2px 8px rgba(0,150,210,0.2);}
.tut-nav-btn.primary{background:linear-gradient(135deg,#22cc66,#11aa55);border-color:#0a9944;color:#fff;margin-left:auto;}
.tut-nav-btn.primary:hover{border-color:#0a9944;box-shadow:0 2px 10px rgba(20,180,80,0.3);}
/* Countdown — 簡潔單欄佈局 */
#countdownOverlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;z-index:5;
  background:rgba(206,220,234,0.74);
}
#countdownNum{
  font-size:72px;color:#0088cc;line-height:1;
  text-shadow:0 2px 16px rgba(0,140,200,0.3);
  animation:cdpop 1s ease-out forwards;
}
@keyframes cdpop{
  0%{transform:scale(1.4);opacity:0;}
  25%{transform:scale(1.0);opacity:1;}
  75%{transform:scale(1.0);opacity:1;}
  100%{transform:scale(0.8);opacity:0;}
}
#countdownLabel{
  font-size:11px;letter-spacing:3px;color:#3a6a85;
  margin-top:2px;margin-bottom:18px;
}
/* 事件：單行文字，無卡片框 */
#cdEventName{
  font-size:14px;letter-spacing:2px;
  color:#0088cc;margin-bottom:3px;
  transition:color 0.3s,text-shadow 0.3s;
  text-shadow:0 0 10px currentColor;
}
#cdEventDesc{
  font-size:10px;letter-spacing:1px;color:#3a6a85;
  transition:color 0.3s;
}
#skipBtn{
  margin-top:20px;
  background:#ffffff;
  border:1px solid #99c4dd;color:#0088cc;
  padding:5px 18px;cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  pointer-events:all;transition:all 0.2s;
}
#skipBtn:hover{border-color:#0088cc;color:#0066aa;background:#f0f8fc;}

#levelGrid{display:flex;gap:14px;margin:8px 0 4px;flex-wrap:wrap;justify-content:center;}
.level-card{width:180px;background:linear-gradient(135deg,#ffffff,#eef6fb);border:1px solid #88bbd5;border-radius:8px;padding:14px;cursor:pointer;transition:all 0.2s;text-align:center;}
.level-card:hover{border-color:#0088cc;box-shadow:0 6px 20px rgba(0,140,200,0.3);transform:translateY(-3px);}
.level-card .lc-name{font-size:16px;color:#005580;letter-spacing:2px;margin-bottom:4px;}
.level-card .lc-desc{font-size:10px;color:#4a7a95;margin-bottom:10px;min-height:24px;}
.level-card canvas{display:block;margin:0 auto;border:1px solid #cfe0ea;border-radius:4px;background:#d4e0ea;}
#menuBg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="840" height="560"></canvas>
  <div id="toolbar">
    <div id="toolbarHint"><span id="hint">← 選擇塔種後點空地建造</span></div>
    <div id="toolbarMain">
      <div class="tb-group">
        <button class="tower-btn" id="btnMG" onclick="selectTower('MG')">⚙ 機槍塔 [100G]</button>
        <button class="tower-btn fire-btn" id="btnFire" onclick="selectTower('Fire')">🔥 火焰塔 [150G]</button>
        <button class="tower-btn ice-btn" id="btnIce" onclick="selectTower('Ice')">❄ 冰霜塔 [100G]</button>
      </div>
      <div class="tb-divider" id="towerActionDiv" style="display:none"></div>
      <div class="tb-group" id="towerActions">
        <button id="upgradeBtn" onclick="upgradeSelected()">▲ 升級</button>
        <button id="sellBtn" onclick="sellSelected()">× 賣出</button>
      </div>
      <div class="tb-spacer"></div>
      <div class="tb-group">
        <button id="pauseBtn" onclick="togglePause()">⏸ 暫停</button>
        <div class="tb-divider"></div>
        <button id="soundBtn" onclick="toggleSound()">🔊 音效：開</button>
        <div class="tb-divider"></div>
        <button id="waveBtn" onclick="manualStartWave()">▶ 第 1 波</button>
      </div>
    </div>
  </div>
  <div class="overlay" id="menuOverlay">
    <canvas id="menuBg"></canvas>
    <h1 style="position:relative;z-index:1">MACHINE<br>RIFT</h1>
    <div class="subtitle" style="position:relative;z-index:1">戰術防禦系統 v1.0</div>
    <div id="menuHS"  style="font-size:12px;color:#996600;letter-spacing:2px;margin-bottom:28px;"></div>
    <button class="overlay-btn" onclick="openLevelSelect()" style="position:relative;z-index:1">[ 開始任務 ]</button>
    <button class="overlay-btn" onclick="openTutorial()" style="border-color:#3a6a8555;color:#3a6a85;font-size:11px;padding:7px 26px;margin-top:2px;position:relative;z-index:1">[ 戰術簡報 ]</button>
  </div>
  <!-- 關卡選擇 -->
  <div class="overlay" id="levelOverlay" style="display:none">
    <h1 style="font-size:38px;letter-spacing:6px;">選擇關卡</h1>
    <div class="subtitle">SELECT BATTLEFIELD</div>
    <div id="levelGrid"></div>
    <button class="overlay-btn" onclick="backToMenu()" style="border-color:#3a6a85;color:#3a6a85;font-size:11px;padding:7px 26px;margin-top:18px">[ 返回 ]</button>
  </div>
  <div class="overlay" id="gameoverOverlay" style="display:none">
    <h1>系統<br>崩潰</h1>
    <div class="subtitle">基地防禦歸零</div>
    <div class="score-display" id="gameoverScore"></div>
    <div id="gameoverHS" style="font-size:12px;color:#996600;letter-spacing:2px;margin-bottom:6px;"></div>
    <button class="overlay-btn" onclick="restartGame()">[ 重新挑戰 ]</button>
    <button class="overlay-btn" onclick="goMainMenu()" style="border-color:#3a6a8555;color:#3a6a85;font-size:11px;padding:7px 26px">[ 主選單 ]</button>
  </div>

function getAC(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return audioCtx;}
function playTone(freq,type,dur,vol,delay=0,freqEnd=null){
  if(!soundOn)return;const ac=getAC();if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime+delay);
  if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,ac.currentTime+delay+dur);
  g.gain.setValueAtTime(0,ac.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.005);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur+0.01);
}
function playNoise(dur,vol,delay=0){
  if(!soundOn)return;const ac=getAC();if(!ac)return;
  const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource();src.buffer=buf;
  const g=ac.createGain(),f=ac.createBiquadFilter();
  f.type='bandpass';f.frequency.value=400;f.Q.value=0.5;
  src.connect(f);f.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime(vol,ac.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
  src.start(ac.currentTime+delay);src.stop(ac.currentTime+delay+dur+0.01);
}
function sfxShoot(type){
  if(type==='MG'){
    // 柔和的機械點擊聲：sine + 低通濾波
    if(!soundOn)return;const ac=getAC();if(!ac)return;
    const o=ac.createOscillator(),f=ac.createBiquadFilter(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(180,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+0.05);
    f.type='lowpass';f.frequency.value=600;f.Q.value=1.2;
    o.connect(f);f.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(0.07,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.06);
    o.start(ac.currentTime);o.stop(ac.currentTime+0.07);
  }
  else if(type==='Fire'){
    // 柔和的火焰噴射聲：低頻 sine 滑音 + 輕度噪音
    if(!soundOn)return;const ac=getAC();if(!ac)return;
    const o=ac.createOscillator(),f=ac.createBiquadFilter(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(90,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(50,ac.currentTime+0.12);
    f.type='lowpass';f.frequency.value=300;f.Q.value=0.8;
    o.connect(f);f.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(0.06,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.14);
    o.start(ac.currentTime);o.stop(ac.currentTime+0.15);
  }
  else{playTone(1200,'sine',0.08,0.05);playTone(600,'sine',0.12,0.03,0.02,200);}
}

function togglePause(){

    document.getElementById('pGold').textContent=game.gold;

    if(loopId){cancelAnimationFrame(loopId);loopId=null;}
  } else {
    // Resume
    btn.textContent='⏸ 暫停';btn.classList.remove('paused');

    if(game.inCountdown&&game.countdown>0){

        if(!game||game.paused){clearInterval(cdInterval);return;}

    }
    loopId=requestAnimationFrame(loop);

}

function updateFloats(ft){for(let i=ft.length-1;i>=0;i--){ft[i].y+=ft[i].vy;ft[i].x+=ft[i].vx;ft[i].vy*=0.96;ft[i].life--;if(ft[i].life<=0)ft.splice(i,1);}}
function drawFloats(ctx,ft){
  ft.forEach(f=>{
    const a=Math.min(1,f.life/20);
    ctx.save();ctx.globalAlpha=a;
    ctx.shadowColor=f.color;ctx.shadowBlur=6;
    ctx.fillStyle=f.color;ctx.font=`bold ${f.size}px "Share Tech Mono",monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.text,f.x,f.y);ctx.restore();
  });
}

function buildSpawnQueue(waveIdx){
  const wd=WAVES[waveIdx],opts={};
  if(currentWaveEvent)currentWaveEvent.apply(opts);
  // 疊加關卡固定難度倍率
  const lv=LEVELS[currentLevel];
  const lvHp=lv.hpMul||1, lvSpd=lv.spdMul||1;
  const q=[];
  wd.forEach(({type,count})=>{
    let n=count;
    if(opts.countMul&&type!=='Boss')n=Math.round(n*opts.countMul);
    for(let i=0;i<n;i++){
      const eo={};
      // 關卡倍率 × 波次事件倍率
      const hp=(opts.hpMul||1)*lvHp;
      const spd=(opts.spdMul||1)*lvSpd;
      if(hp!==1)  eo.hpMul=hp;
      if(spd!==1) eo.spdMul=spd;
      if(opts.regen)  eo.regen=opts.regen;
      q.push({type,opts:eo});
    }
  });
  for(let i=q.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[q[i],q[j]]=[q[j],q[i]];}
  towerRateMulActive=opts.towerRateMul||1;
  return q;
}

// ═══════════════════════════════════════════════════════════════
// ENEMY CLASS
// ═══════════════════════════════════════════════════════════════
class Enemy{
  constructor(type,opts={}){
    const c=ECFG[type];
    this.type=type;
    this.baseSpeed=c.speed;this.speed=c.speed;
    this.reward=c.reward;this.color=c.color;this.size=c.size;
    this.pathIdx=0;this.x=PATH[0].x;this.y=PATH[0].y;
    this.dead=false;this.reached=false;this.slowTimer=0;
    this.dying=false;this.dyingTimer=0;this.dyingMax=22;
    this.dyingPieces=[];
    this.hp=c.hp;this.maxHp=c.hp;
    // 波次事件 buff
    if(opts.hpMul) {this.hp=Math.round(this.hp*opts.hpMul);this.maxHp=this.hp;}
    if(opts.spdMul){this.baseSpeed*=opts.spdMul;this.speed=this.baseSpeed;}
    this.regenPerTick=opts.regen||0;
    this.regenAccum=0;
  }
  update(){
    if(this.dying){this.dyingTimer++;this.dyingPieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.rot+=p.rotV;p.a*=0.9;});return;}
    if(this.regenPerTick>0&&this.hp<this.maxHp){this.regenAccum++;if(this.regenAccum>=60){this.regenAccum=0;this.hp=Math.min(this.maxHp,this.hp+this.regenPerTick);}}
    if(this.slowTimer>0)this.slowTimer--;else this.speed=this.baseSpeed;
    let rem=this.speed*2;
    while(rem>0&&this.pathIdx<PATH.length-1){
      const t=PATH[this.pathIdx+1],dx=t.x-this.x,dy=t.y-this.y,d=Math.hypot(dx,dy);
      if(d<=rem){this.x=t.x;this.y=t.y;this.pathIdx++;rem-=d;}
      else{this.x+=dx/d*rem;this.y+=dy/d*rem;rem=0;}
    }
    if(this.pathIdx>=PATH.length-1)this.reached=true;
  }
  startDeath(){
    this.dying=true;this.dead=true;
    // Generate shrapnel pieces
    const n=this.type==='Boss'?24:this.type==='Tank'?12:this.type==='Fast'?6:8;
    this.dyingMax=this.type==='Boss'?40:22;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
      this.dyingPieces.push({x:this.x,y:this.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,rot:Math.random()*Math.PI,rotV:(Math.random()-0.5)*0.3,a:1,size:2+Math.random()*4});
    }
  }
  applyIce(f,dur){this.speed=this.baseSpeed*f;this.slowTimer=dur;}
  draw(ctx){
    if(this.dying){
      const prog=this.dyingTimer/this.dyingMax;
      ctx.save();
      this.dyingPieces.forEach(p=>{
        ctx.save();ctx.globalAlpha=p.a*(1-prog*0.5);
        ctx.shadowColor=this.color;ctx.shadowBlur=6;
        ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.fillStyle=this.color;
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
        ctx.restore();
      });
      // flash ring
      ctx.globalAlpha=Math.max(0,1-prog*2);
      ctx.strokeStyle=this.color;ctx.lineWidth=2;ctx.shadowColor=this.color;ctx.shadowBlur=12;
      ctx.beginPath();ctx.arc(this.x,this.y,this.size*(1+prog*2),0,Math.PI*2);ctx.stroke();
      ctx.restore();
      return;
    }
    const x=this.x,y=this.y,r=this.size;
    ctx.save();ctx.shadowColor=this.color;ctx.shadowBlur=8;
    const _t=game?game.animFrame:0, col=this.color;
    if(this.type==='Boss'){
      // Boss: 雙層反向旋轉環 + 脈動核心
      const pulse=(Math.sin(_t*0.05)+1)*0.5;
      ctx.save();ctx.translate(x,y);ctx.shadowBlur=18+pulse*12;
      // 外環 (旋轉八角，尖角內凹交錯)
      ctx.rotate(_t*0.01);
      ctx.fillStyle=col+'1a';ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();
      for(let i=0;i<8;i++){const a=i*Math.PI/4;const rr=i%2?r:r*0.82;i===0?ctx.moveTo(rr,0):ctx.lineTo(rr*Math.cos(a),rr*Math.sin(a));}
      ctx.closePath();ctx.fill();ctx.stroke();
      // 中環 (反向旋轉六角)
      ctx.rotate(-_t*0.03);
      ctx.strokeStyle=col+'aa';ctx.lineWidth=1.5;ctx.shadowBlur=6;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3;i===0?ctx.moveTo(r*0.6,0):ctx.lineTo(r*0.6*Math.cos(a),r*0.6*Math.sin(a));}
      ctx.closePath();ctx.stroke();
      // 脈動核心
      ctx.rotate(_t*0.02);
      ctx.fillStyle='#ff8800';ctx.shadowColor='#ffaa00';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(0,0,r*(0.28+pulse*0.08),0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffffff';ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(0,0,r*0.12,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else if(this.type==='Tank'){
      // 重裝方塊 + 履帶 + 鉚釘
      ctx.save();ctx.translate(x,y);
      ctx.fillStyle=col+'2a';ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(-r,-r,r*2,r*2,4);ctx.fill();ctx.stroke();
      // 履帶 (上下)
      ctx.fillStyle=col+'66';ctx.fillRect(-r,-r-3,r*2,3);ctx.fillRect(-r,r,r*2,3);
      ctx.fillStyle=col;
      for(let i=-2;i<=2;i++){ctx.fillRect(i*r*0.45-1,-r-3,2,3);ctx.fillRect(i*r*0.45-1,r,2,3);}
      // 中央砲塔
      ctx.fillStyle=col;ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(0,0,r*0.4,0,Math.PI*2);ctx.fill();
      // 四角鉚釘
      ctx.fillStyle=col+'aa';
      [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(d=>{ctx.beginPath();ctx.arc(d[0]*r*0.6,d[1]*r*0.6,1.5,0,Math.PI*2);ctx.fill();});
      ctx.restore();
    } else if(this.type==='Fast'){
      // 流線梭形 + 駕駛艙 + 尾焰 (依移動方向旋轉)
      ctx.save();ctx.translate(x,y);
      // 計算朝向 (用路徑下一點)
      let ang=0;
      if(this.pathIdx<PATH.length-1){const nx=PATH[this.pathIdx+1];ang=Math.atan2(nx.y-y,nx.x-x);}
      ctx.rotate(ang);
      ctx.fillStyle=col+'33';ctx.strokeStyle=col;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(-r*0.6,r*0.8);ctx.lineTo(-r*0.3,0);ctx.lineTo(-r*0.6,-r*0.8);ctx.closePath();ctx.fill();ctx.stroke();
      // 駕駛艙
      ctx.fillStyle='#ffffff';ctx.shadowBlur=4;ctx.beginPath();ctx.arc(r*0.3,0,2,0,Math.PI*2);ctx.fill();
      // 尾焰
      const flick=0.6+Math.sin(_t*0.4)*0.4;
      ctx.fillStyle='#ffdd44cc';ctx.shadowColor='#ffaa00';ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(-r*0.3,r*0.35);ctx.lineTo(-r*(0.9+flick),0);ctx.lineTo(-r*0.3,-r*0.35);ctx.closePath();ctx.fill();
      ctx.restore();
    } else {
      // 普通兵: 六邊外殼 + 旋轉內核 + 環繞點
      ctx.save();ctx.translate(x,y);
      ctx.rotate(_t*0.02);
      ctx.fillStyle=col+'22';ctx.strokeStyle=col;ctx.lineWidth=1.5;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3;i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));}
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.rotate(-_t*0.04);
      ctx.fillStyle=col;ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(0,0,r*0.35,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=col+'cc';
      for(let i=0;i<3;i++){const a=i*Math.PI*2/3+_t*0.02;ctx.beginPath();ctx.arc(r*0.7*Math.cos(a),r*0.7*Math.sin(a),1.6,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    }
    if(this.slowTimer>0){ctx.strokeStyle='#44aaff55';ctx.lineWidth=1;ctx.shadowBlur=0;ctx.beginPath();ctx.arc(x,y,r+8,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
    const bw=r*3,bh=3;
    ctx.fillStyle='rgba(180,200,215,0.85)';ctx.fillRect(x-bw/2,y-r-10,bw,bh);
    const hr=this.hp/this.maxHp,hc=hr>0.5?'#00ff66':hr>0.25?'#ffe000':'#ff2244';
    ctx.fillStyle=hc;ctx.fillRect(x-bw/2,y-r-10,bw*hr,bh);
    ctx.strokeStyle=hc+'33';ctx.lineWidth=0.5;ctx.strokeRect(x-bw/2,y-r-10,bw,bh);
  }
}

// ═══════════════════════════════════════════════════════════════
// BULLET CLASS — enhanced with type-specific FX
// ═══════════════════════════════════════════════════════════════
class Bullet{
  constructor(x,y,tgt,dmg,type,aoe,slow){
    this.x=x;this.y=y;this.target=tgt;this.dmg=dmg;this.type=type;this.aoe=aoe;this.slow=slow;
    this.speed=type==='Fire'?4:type==='Ice'?5:9;
    this.dead=false;
    this.color=type==='Fire'?'#ff8844':type==='Ice'?'#88ddff':'#00e5ff';
    this.r=type==='Fire'?5:type==='Ice'?4:2.5;
    this.trail=[];this.age=0;
  }
  update(enemies,particles,floatTexts){
    if(!this.target||this.target.dead||this.target.reached){this.dead=true;return;}
    this.age++;
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>8)this.trail.shift();
    const dx=this.target.x-this.x,dy=this.target.y-this.y,dist=Math.hypot(dx,dy);
    if(dist<this.speed+this.r){
      if(this.aoe>0){
        const ar=this.aoe*CELL;
        enemies.forEach(e=>{
          if(!e.dead&&!e.reached&&Math.hypot(e.x-this.target.x,e.y-this.target.y)<ar){
            e.hp-=this.dmg;
            spawnFloat(floatTexts,e.x+Math.random()*16-8,e.y-e.size-4,'-'+this.dmg,'#ff8844',11);
            if(e.hp<=0&&!e.dying)e.startDeath();
          }
        });
        spawnBigExplosion(particles,this.target.x,this.target.y,this.color,ar);
        sfxBigExplosion();
      } else {
        const wasDead=this.target.hp<=0;
        this.target.hp-=this.dmg;
        if(this.slow)this.target.applyIce(this.slow,90);
        spawnFloat(floatTexts,this.target.x+(Math.random()*14-7),this.target.y-this.target.size-4,'-'+this.dmg,this.type==='Ice'?'#88ddff':'#ff4466',11);
        if(this.target.hp<=0&&!this.target.dying&&!wasDead)this.target.startDeath();
        spawnSpark(particles,this.x,this.y,this.color);
        sfxHit();
      }
      this.dead=true;
    } else {this.x+=dx/dist*this.speed;this.y+=dy/dist*this.speed;}
  }
  draw(ctx){
    ctx.save();
    // Trail
    if(this.type==='MG'){
      // Elongated tracer
      if(this.trail.length>1){
        const t0=this.trail[0],t1=this.trail[this.trail.length-1];
        ctx.strokeStyle=this.color+'88';ctx.lineWidth=2;ctx.shadowColor=this.color;ctx.shadowBlur=8;
        ctx.beginPath();ctx.moveTo(t0.x,t0.y);ctx.lineTo(this.x,this.y);ctx.stroke();
      }
    } else if(this.type==='Fire'){
      // Flame trail with expanding dots
      this.trail.forEach((p,i)=>{
        ctx.globalAlpha=(i/this.trail.length)*0.5;
        ctx.fillStyle=i>this.trail.length/2?'#ff4400':'#ff8844';
        ctx.shadowColor='#ff6600';ctx.shadowBlur=8;
        const tr=this.r*(i/this.trail.length)*1.5;
        ctx.beginPath();ctx.arc(p.x,p.y,tr,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
    } else if(this.type==='Ice'){
      // Crystal trail
      this.trail.forEach((p,i)=>{
        ctx.globalAlpha=(i/this.trail.length)*0.4;
        ctx.strokeStyle=this.color;ctx.lineWidth=1;ctx.shadowColor=this.color;ctx.shadowBlur=6;
        const s=2*(i/this.trail.length);
        ctx.strokeRect(p.x-s,p.y-s,s*2,s*2);
      });
      ctx.globalAlpha=1;
    }
    // Bullet core
    ctx.shadowColor=this.color;ctx.shadowBlur=this.type==='Fire'?16:10;
    ctx.fillStyle=this.color;
    if(this.type==='Ice'){
      // Crystal shape
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.lineTo(this.x+this.r*Math.cos(a),this.y+this.r*Math.sin(a));}
      ctx.closePath();ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
      // Inner bright core
      ctx.fillStyle='#ffffff88';ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(this.x,this.y,this.r*0.4,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
// TOWER CLASS — build animation + shoot flash
// ═══════════════════════════════════════════════════════════════
class Tower{
  constructor(col,row,type){
    this.col=col;this.row=row;this.type=type;this.level=1;
    this.x=col*CELL+CELL/2;this.y=row*CELL+CELL/2;
    this.cfg=TCFG[type];this.fireCooldown=0;this.target=null;this.angle=0;this.shootFlash=0;
    // Build animation
    this.buildAnim=1.0;this.buildScale=0;
  }
  get stats(){return this.cfg.stats[this.level-1];}
  get range(){return this.stats.range*CELL;}
  get upgradeCost(){return this.level<3?Math.round(this.cfg.cost*0.7*this.level):0;}
  get sellValue(){return Math.round(this.cfg.cost*0.5+(this.level-1)*this.cfg.cost*0.3);}
  update(enemies,bullets,particles){
    // Build animation
    if(this.buildScale<1){this.buildScale=Math.min(1,this.buildScale+0.07);this.buildAnim=this.buildScale;}
    if(this.fireCooldown>0)this.fireCooldown--;if(this.shootFlash>0)this.shootFlash--;
    let best=null;
    enemies.forEach(e=>{if(e.dead||e.reached||e.dying)return;const d=Math.hypot(e.x-this.x,e.y-this.y);if(d<this.range&&e.pathIdx>(best?.pathIdx??-1))best=e;});
    this.target=best;
    if(this.target){
      this.angle=Math.atan2(this.target.y-this.y,this.target.x-this.x);
      if(this.fireCooldown<=0){
        const s=this.stats;
        bullets.push(new Bullet(this.x,this.y,this.target,s.dmg,this.type,s.aoe||0,s.slow||0));
        this.fireCooldown=Math.round(s.rate*(typeof towerRateMulActive!=='undefined'?towerRateMulActive:1));this.shootFlash=8;
        sfxShoot(this.type);
      }
    }
  }
  draw(ctx,sel){
    const x=this.x,y=this.y,col=this.cfg.col,acc=this.cfg.acc;
    const sc=this.buildScale;
    ctx.save();
    // Build-in scale animation
    ctx.translate(x,y);ctx.scale(sc,sc);ctx.translate(-x,-y);
    if(sel){ctx.strokeStyle=col+'22';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.beginPath();ctx.arc(x,y,this.range,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    // Build particles burst when scale just became 1
    ctx.shadowColor=col;ctx.shadowBlur=sel?20:this.shootFlash>0?14:6;
    // Hex base
    ctx.fillStyle='#ffffff';ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();
    for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;i===0?ctx.moveTo(x+18*Math.cos(a),y+18*Math.sin(a)):ctx.lineTo(x+18*Math.cos(a),y+18*Math.sin(a));}
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.strokeStyle=col+'33';ctx.lineWidth=0.5;ctx.beginPath();
    for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;i===0?ctx.moveTo(x+11*Math.cos(a),y+11*Math.sin(a)):ctx.lineTo(x+11*Math.cos(a),y+11*Math.sin(a));}
    ctx.closePath();ctx.stroke();
    // Turret
    ctx.translate(x,y);ctx.rotate(this.angle);
    if(this.type==='MG'){
      // 雙管機槍
      ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(-6,-5,11,10,2);ctx.fill();
      ctx.fillStyle=acc;ctx.fillRect(4,-3.5,13,2.5);ctx.fillRect(4,1,13,2.5);
      ctx.fillStyle=col+'88';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      if(this.shootFlash>0){ctx.fillStyle='#ffffffcc';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(17,-2.3,2.2,0,Math.PI*2);ctx.arc(17,2.3,2.2,0,Math.PI*2);ctx.fill();}
    } else if(this.type==='Fire'){
      // 火焰噴射器 (粗管 + 噴口環)
      ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=acc;ctx.beginPath();ctx.roundRect(2,-4,14,8,2);ctx.fill();
      ctx.strokeStyle='#ff4400';ctx.lineWidth=2;ctx.beginPath();ctx.arc(16,0,3.5,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#ffcc66';ctx.beginPath();ctx.arc(0,0,3.5,0,Math.PI*2);ctx.fill();
      if(this.shootFlash>0){ctx.fillStyle='#ffaa44cc';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(17,0,5,0,Math.PI*2);ctx.fill();}
    } else {
      // 冰霜發射器 (方塊 + 晶體砲口)
      ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(-8,-8,16,16,3);ctx.fill();
      ctx.fillStyle=acc;ctx.fillRect(5,-3,11,6);
      ctx.fillStyle='#ffffff';ctx.beginPath();ctx.moveTo(17,0);ctx.lineTo(14,-3);ctx.lineTo(11,0);ctx.lineTo(14,3);ctx.closePath();ctx.fill();
      ctx.fillStyle='#cceeff';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
      if(this.shootFlash>0){ctx.strokeStyle='#88ddffcc';ctx.lineWidth=1.5;ctx.shadowBlur=16;ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.stroke();}
    }
    ctx.restore();
    // Level pips
    for(let i=0;i<this.level;i++){ctx.fillStyle=acc;ctx.shadowColor=acc;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(x-7+i*7,y+21,2,0,Math.PI*2);ctx.fill();}
    // Build ring effect when sc < 1
    if(sc<1){
      ctx.globalAlpha=1-sc;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.shadowColor=col;ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(x,y,28*(1-sc+0.3),0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }
    if(sel){ctx.strokeStyle='#ffffff33';ctx.lineWidth=1.5;ctx.shadowBlur=0;ctx.beginPath();ctx.arc(x,y,21,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════════
function spawnBigExplosion(p,x,y,color,r){
  // Shockwave rings
  p.push({x,y,life:25,maxLife:25,color,r:r*0.9,type:'ring',thick:3});
  p.push({x,y,life:18,maxLife:18,color:'#ffffff',r:r*0.4,type:'ring',thick:2});
  // Sparks
  for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;p.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:40,maxLife:40,color,r:2+Math.random()*4,type:'spark'});}
  // Bright flash center
  p.push({x,y,life:8,maxLife:8,color:'#ffffff',r:r*0.5,type:'flash'});
  // Embers
  for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*2;p.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:60,maxLife:60,color:'#ff8800',r:1.5,type:'ember'});}
}
function spawnSpark(p,x,y,color){
  for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2;p.push({x,y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,life:14,maxLife:14,color,r:1.5,type:'spark'});}
}
function spawnBuildFX(p,x,y,color){
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;p.push({x:x+Math.cos(a)*24,y:y+Math.sin(a)*24,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5-1,life:28,maxLife:28,color,r:2,type:'spark'});}
  p.push({x,y,life:16,maxLife:16,color,r:28,type:'ring',thick:1.5});
}
function updateParticles(p){
  for(let i=p.length-1;i>=0;i--){
    const pt=p[i];pt.life--;if(pt.life<=0){p.splice(i,1);continue;}
    if(pt.type==='spark'||pt.type==='ember'){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.12;if(pt.type==='ember')pt.vx*=0.97;}
  }
}
function drawParticles(ctx,p){
  p.forEach(pt=>{
    const a=pt.life/pt.maxLife;
    ctx.save();ctx.globalAlpha=a;ctx.shadowColor=pt.color;ctx.shadowBlur=8;
    if(pt.type==='flash'){
      const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,pt.r*a);
      g.addColorStop(0,'#ffffff');g.addColorStop(1,'transparent');
      ctx.globalAlpha=a;ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();
    } else if(pt.type==='ring'){
      ctx.strokeStyle=pt.color;ctx.lineWidth=pt.thick||2;
      const pr=1-a;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*pr,0,Math.PI*2);ctx.stroke();
    } else {
      ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════════
// MAP DRAW
// ═══════════════════════════════════════════════════════════════
function drawMap(ctx,map,g){
  const t=g.animFrame;
  ctx.fillStyle='#d4e0ea';ctx.fillRect(0,0,W,H);
  // Radar
  ctx.save();ctx.globalAlpha=0.08;
  const rg=ctx.createConicGradient(g.radarAngle,W/2,H/2);
  rg.addColorStop(0,'#0099dd');rg.addColorStop(0.1,'#0099dd');rg.addColorStop(0.15,'transparent');rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.beginPath();ctx.arc(W/2,H/2,Math.max(W,H),0,Math.PI*2);ctx.fill();ctx.restore();
  // ── 科技背景細節 ──
  // 電路紋路
  ctx.save();ctx.strokeStyle='rgba(0,110,170,0.16)';ctx.lineWidth=1.2;
  const _circuit=[[2,1,5],[7,3,4],[11,6,3],[4,8,6],[9,1,3],[13,4,5],[1,5,4],[6,7,5]];
  _circuit.forEach(s=>{const cx=s[0]*CELL,cy=s[1]*CELL;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+s[2]*CELL*0.5,cy);ctx.lineTo(cx+s[2]*CELL*0.5,cy+CELL*1.5);ctx.stroke();ctx.fillStyle='rgba(0,110,170,0.28)';ctx.fillRect(cx-2.5,cy-2.5,5,5);});
  ctx.restore();
  // 同心圓刻度環
  ctx.save();ctx.strokeStyle='rgba(0,130,190,0.14)';ctx.lineWidth=1;
  [80,160,240].forEach(rad=>{ctx.beginPath();ctx.arc(W/2,H/2,rad,0,Math.PI*2);ctx.stroke();});
  for(let i=0;i<24;i++){const a=i*Math.PI/12;ctx.beginPath();ctx.moveTo(W/2+Math.cos(a)*240,H/2+Math.sin(a)*240);ctx.lineTo(W/2+Math.cos(a)*250,H/2+Math.sin(a)*250);ctx.stroke();}
  ctx.restore();
  // Grid lines
  ctx.strokeStyle='rgba(0,140,200,0.12)';ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}
  // 格線交叉節點 (小十字)
  ctx.strokeStyle='rgba(0,130,190,0.35)';ctx.lineWidth=1;
  for(let cc=0;cc<=COLS;cc+=3){for(let rr=0;rr<=ROWS;rr+=2){const nx=cc*CELL,ny=rr*CELL;ctx.beginPath();ctx.moveTo(nx-4,ny);ctx.lineTo(nx+4,ny);ctx.moveTo(nx,ny-4);ctx.lineTo(nx,ny+4);ctx.stroke();}}
  // 流動資料點
  ctx.save();
  for(let i=0;i<8;i++){const row=(i*137)%ROWS;const px=((t*0.7+i*110)%(W+40))-20;ctx.fillStyle='rgba(0,150,215,0.4)';ctx.shadowColor='#0099dd';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(px,row*CELL,2.2,0,Math.PI*2);ctx.fill();}
  ctx.restore();
  // 四角 HUD 裝飾框 (避開頂部 HUD)
  ctx.save();ctx.strokeStyle='rgba(0,120,180,0.5)';ctx.lineWidth=2;
  const _m=12,_L=28,_topY=44;
  [[_m,_topY,1,1],[W-_m,_topY,-1,1],[_m,H-_m,1,-1],[W-_m,H-_m,-1,-1]].forEach(cn=>{ctx.beginPath();ctx.moveTo(cn[0]+cn[2]*_L,cn[1]);ctx.lineTo(cn[0],cn[1]);ctx.lineTo(cn[0],cn[1]+cn[3]*_L);ctx.stroke();});
  // 角落座標標籤
  ctx.fillStyle='rgba(0,120,180,0.4)';ctx.font='8px "Share Tech Mono",monospace';
  ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('SYS//GRID',_m+4,_topY+4);
  ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText('SEC-01',W-_m-4,H-_m-4);
  ctx.restore();
  // 邊緣刻度尺 (左側 + 頂部,像量測刻度)
  ctx.save();ctx.strokeStyle='rgba(0,130,190,0.22)';ctx.lineWidth=1;
  for(let r=1;r<ROWS;r++){const len=r%2===0?6:3;ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(len,r*CELL);ctx.stroke();}
  ctx.restore();
  // Cells
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const v=map[r][c],x=c*CELL,y=r*CELL;
      if(v===1){
        ctx.fillStyle='#c2e0d0';ctx.fillRect(x,y,CELL,CELL);
        ctx.fillStyle='#22cc6622';ctx.fillRect(x,y,CELL,CELL);
        ctx.strokeStyle='#22cc6644';ctx.lineWidth=0.5;ctx.strokeRect(x+3,y+3,CELL-6,CELL-6);
        ctx.strokeStyle='#11aa5566';ctx.lineWidth=0.8;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(x+CELL/2,y+4);ctx.lineTo(x+CELL/2,y+CELL-4);ctx.stroke();
        ctx.moveTo(x+4,y+CELL/2);ctx.lineTo(x+CELL-4,y+CELL/2);ctx.stroke();
        ctx.setLineDash([]);
      } else if(v===0||v===4){
        ctx.fillStyle='#cdd9e6';ctx.fillRect(x,y,CELL,CELL);
        const pulse=(Math.sin(t*0.02+c*0.3+r*0.5)+1)*0.5;
        ctx.fillStyle=`rgba(0,140,200,${0.06+pulse*0.06})`;ctx.fillRect(x+CELL/2-1,y+CELL/2-1,2,2);
        if(v===0){const cs=5;ctx.strokeStyle='rgba(0,140,200,0.15)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x+cs,y);ctx.lineTo(x,y);ctx.lineTo(x,y+cs);ctx.moveTo(x+CELL-cs,y);ctx.lineTo(x+CELL,y);ctx.lineTo(x+CELL,y+cs);ctx.moveTo(x,y+CELL-cs);ctx.lineTo(x,y+CELL);ctx.lineTo(x+cs,y+CELL);ctx.moveTo(x+CELL,y+CELL-cs);ctx.lineTo(x+CELL,y+CELL);ctx.lineTo(x+CELL-cs,y+CELL);ctx.stroke();}
      } else if(v===2){
        const bp=(Math.sin(t*0.05)+1)*0.5;ctx.fillStyle='#b4d4e8';ctx.fillRect(x,y,CELL,CELL);
        ctx.save();ctx.shadowColor='#0099dd';ctx.shadowBlur=8+bp*10;ctx.strokeStyle=`rgba(0,140,210,${0.6+bp*0.4})`;ctx.lineWidth=2;ctx.strokeRect(x+3,y+3,CELL-6,CELL-6);
        ctx.fillStyle=`rgba(0,150,220,${0.1+bp*0.12})`;ctx.fillRect(x+3,y+3,CELL-6,CELL-6);
        ctx.fillStyle='#0077aa';ctx.font='bold 9px "Share Tech Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('基地',x+CELL/2,y+CELL/2);ctx.restore();
      } else if(v===3){
        const sp=(Math.sin(t*0.08)+1)*0.5;ctx.fillStyle='#e8c2ca';ctx.fillRect(x,y,CELL,CELL);
        ctx.save();ctx.shadowColor='#ee3355';ctx.shadowBlur=6+sp*8;ctx.strokeStyle=`rgba(220,50,70,${0.5+sp*0.5})`;ctx.lineWidth=1.5;ctx.strokeRect(x+3,y+3,CELL-6,CELL-6);
        ctx.fillStyle=`rgba(220,50,70,${0.06+sp*0.08})`;ctx.fillRect(x+3,y+3,CELL-6,CELL-6);
        ctx.fillStyle='#cc2233';ctx.font='8px "Share Tech Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('出生',x+CELL/2,y+CELL/2);ctx.restore();
      }
    }
  }
  // Scan line
  ctx.save();const sg=ctx.createLinearGradient(0,g.scanY-22,0,g.scanY+22);sg.addColorStop(0,'transparent');sg.addColorStop(0.5,'rgba(0,150,210,0.07)');sg.addColorStop(1,'transparent');ctx.fillStyle=sg;ctx.fillRect(0,g.scanY-22,W,44);ctx.strokeStyle='rgba(0,150,210,0.18)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(0,g.scanY);ctx.lineTo(W,g.scanY);ctx.stroke();ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// HUD

function drawHUD(ctx,g){
  const hudG=ctx.createLinearGradient(0,0,W,0);hudG.addColorStop(0,'rgba(216,228,240,0.97)');hudG.addColorStop(0.5,'rgba(208,220,234,0.97)');hudG.addColorStop(1,'rgba(200,214,230,0.97)');
  ctx.fillStyle=hudG;ctx.fillRect(0,0,W,38);

  const bk=14;ctx.strokeStyle='rgba(0,140,200,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(bk,0);ctx.lineTo(0,0);ctx.lineTo(0,bk);ctx.moveTo(W-bk,0);ctx.lineTo(W,0);ctx.lineTo(W,bk);ctx.stroke();
  const items=[{label:'金幣',value:g.gold,color:'#cc9900',icon:'◆'},{label:'基地血量',value:g.baseHP,color:g.baseHP<=3?'#dd3344':'#11aa55',icon:'◉'},{label:'波次',value:g.waveIndex+' / 3',color:'#0088cc',icon:'◈'},{label:'得分',value:g.score,color:'#8855cc',icon:'◇'}];
  items.forEach((item,i)=>{const x=18+i*202;if(i>0){ctx.strokeStyle='rgba(0,140,200,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x-4,6);ctx.lineTo(x-4,32);ctx.stroke();}ctx.fillStyle='#6699aa';ctx.font='9px "Share Tech Mono",monospace';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(item.icon+' '+item.label,x,8);ctx.shadowBlur=0;ctx.fillStyle=item.color;ctx.font='bold 15px "Share Tech Mono",monospace';ctx.fillText(item.value,x,20);ctx.shadowBlur=0;});
  if(g.waveActive&&g.totalEnemies>0){const alive=g.enemies.filter(e=>!e.dead&&!e.reached).length+g.spawnQ.length,prog=1-alive/g.totalEnemies;ctx.fillStyle='#00ff4406';ctx.fillRect(0,34,W,4);ctx.fillStyle='#00ff4428';ctx.fillRect(0,34,W*prog,4);ctx.fillStyle='#00ff4455';ctx.fillRect(0,34,W*prog,2);ctx.shadowColor='#00ff44';ctx.shadowBlur=6;ctx.fillStyle='#00ff4466';ctx.fillRect(W*prog-1,34,2,4);ctx.shadowBlur=0;}
  if(g.inCountdown){ctx.save();ctx.shadowColor='#ffe000';ctx.shadowBlur=14;ctx.fillStyle='#ffe000';ctx.font='bold 16px "Share Tech Mono",monospace';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(g.countdown+' 秒後開波',W-18,19);ctx.restore();}

function drawPreview(ctx,g,mx,my){
  if(!g.selType)return;
  const col=Math.floor(mx/CELL),row=Math.floor(my/CELL);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const v=g.map[row][col],ok=v===0,cfg=TCFG[g.selType],x=col*CELL,y=row*CELL;
  ctx.save();
  if(ok){ctx.fillStyle=cfg.col+'1a';ctx.strokeStyle=cfg.col;ctx.lineWidth=1.5;ctx.shadowColor=cfg.col;ctx.shadowBlur=12;}else{ctx.fillStyle='#ff22441a';ctx.strokeStyle='#ff2244';ctx.lineWidth=1;ctx.shadowBlur=0;}
  ctx.fillRect(x+2,y+2,CELL-4,CELL-4);ctx.strokeRect(x+2,y+2,CELL-4,CELL-4);
  if(ok){const rng=cfg.stats[0].range*CELL;ctx.strokeStyle=cfg.col+'33';ctx.lineWidth=0.5;ctx.setLineDash([3,5]);ctx.shadowBlur=0;ctx.beginPath();ctx.arc(col*CELL+CELL/2,row*CELL+CELL/2,rng,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// COUNTDOWN — with skip
// ═══════════════════════════════════════════════════════════════
const CD_SECS=3;let cdInterval=null,pendingWave=0;
function manualStartWave(){if(!game||game.waveActive||game.inCountdown||game.waveIndex>=3)return;beginCD(game.waveIndex+1);}
function beginCD(wn){
  if(!game||game.waveActive||game.inCountdown)return;
  pickWaveEvent();
  game.inCountdown=true;game.countdown=CD_SECS;pendingWave=wn;
  document.getElementById('waveBtn').disabled=true;
  showCDNum(CD_SECS,wn);
  cdInterval=setInterval(()=>{
    if(!game){clearInterval(cdInterval);return;}
    game.countdown--;
    if(game.countdown<=0){clearInterval(cdInterval);cdInterval=null;game.inCountdown=false;hideCD();execStartWave();}
    else showCDNum(game.countdown,wn);
  },1000);
}
function skipCountdown(){
  if(!cdInterval)return;
  clearInterval(cdInterval);cdInterval=null;
  if(game)game.inCountdown=false;
  hideCD();execStartWave();
}
function showCDNum(n,wn){
  const el=document.getElementById('countdownOverlay');
  const nu=document.getElementById('countdownNum');
  const lb=document.getElementById('countdownLabel');
  nu.textContent=n;
  lb.textContent='// 第 '+wn+' 波來襲';
  el.style.display='flex';
  // Re-trigger pop animation each second
  nu.style.animation='none';
  nu.offsetHeight; // reflow
  nu.style.animation='cdpop 1s ease-out forwards';
}
function hideCD(){const el=document.getElementById('countdownOverlay');el.style.display='none';}
function execStartWave(){
  if(!game||game.waveActive||game.waveIndex>=3)return;
  const q=buildSpawnQueue(game.waveIndex);
  game.spawnQ=q;game.spawnTimer=0;game.waveActive=true;game.waveIndex++;game.totalEnemies=q.length;
  document.getElementById('waveBtn').disabled=true;
  sfxWaveStart();
}

function openLevelSelect(){
  document.getElementById('menuOverlay').style.display='none';
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const card=document.createElement('div');
    card.className='level-card';
    card.onclick=()=>startGame(i);
    card.innerHTML=`<div class="lc-name">${lv.name}</div><div class="lc-desc">${lv.desc}</div>`;
    const cv=document.createElement('canvas');
    cv.width=150;cv.height=100;
    card.appendChild(cv);
    grid.appendChild(card);
    drawMiniMap(cv,lv.map);
  });
  document.getElementById('levelOverlay').style.display='flex';

function backToMenu(){
  document.getElementById('levelOverlay').style.display='none';
  document.getElementById('menuOverlay').style.display='flex';
  startMenuBg();
}
// 迷你地圖預覽
function drawMiniMap(cv,map){
  const mctx=cv.getContext('2d');
  const cw=cv.width/COLS, ch=cv.height/ROWS;
  mctx.fillStyle='#d4e0ea';mctx.fillRect(0,0,cv.width,cv.height);
  for(let r=0;r<ROWS;r++)for(let cc=0;cc<COLS;cc++){
    const v=map[r][cc];
    if(v===1){mctx.fillStyle='#22cc66';mctx.fillRect(cc*cw,r*ch,cw,ch);}
    else if(v===2){mctx.fillStyle='#0099dd';mctx.fillRect(cc*cw,r*ch,cw,ch);}
    else if(v===3){mctx.fillStyle='#ee3355';mctx.fillRect(cc*cw,r*ch,cw,ch);}
  }
  // 細格線
  mctx.strokeStyle='rgba(0,140,200,0.1)';mctx.lineWidth=0.5;
  for(let cc=0;cc<=COLS;cc++){mctx.beginPath();mctx.moveTo(cc*cw,0);mctx.lineTo(cc*cw,cv.height);mctx.stroke();}
  for(let r=0;r<=ROWS;r++){mctx.beginPath();mctx.moveTo(0,r*ch);mctx.lineTo(cv.width,r*ch);mctx.stroke();}
}

function startGame(levelIndex){
  // 載入指定關卡（沒帶參數則用目前選的）
  if(typeof levelIndex==='number')currentLevel=levelIndex;
  MAP_DEF=LEVELS[currentLevel].map;
  PATH_PTS=LEVELS[currentLevel].path;
  WAVES=LEVELS[currentLevel].waves;
  PATH=buildPath();
  ['menuOverlay','victoryOverlay','gameoverOverlay','levelOverlay'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  document.getElementById('menuHS').textContent=fmtHS(getHS());
  hideCD();if(cdInterval){clearInterval(cdInterval);cdInterval=null;}
  if(loopId){cancelAnimationFrame(loopId);loopId=null;}
  game=newGame();mouseX=0;mouseY=0;
  document.getElementById('waveBtn').disabled=false;document.getElementById('waveBtn').textContent='▶ 第 1 波';document.getElementById('waveBtn').style.display='';
  document.getElementById('sellBtn').style.display='none';document.getElementById('upgradeBtn').style.display='none';
  document.getElementById('hint').textContent='← 選擇塔種後點空地建造';
  towerRateMulActive=1;currentWaveEvent=null;
  document.getElementById('waveEventBanner').style.display='none';
  document.getElementById('pauseBtn').textContent='⏸ 暫停';
  document.getElementById('pauseBtn').classList.remove('paused');
  document.getElementById('pauseOverlay').style.display='none';
  loopId=requestAnimationFrame(loop);
}
function restartGame(){startGame();}
function goMainMenu(){if(cdInterval){clearInterval(cdInterval);cdInterval=null;}if(loopId){cancelAnimationFrame(loopId);loopId=null;}hideCD();game=null;['victoryOverlay','gameoverOverlay'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('menuHS').textContent=fmtHS(getHS());document.getElementById('levelOverlay').style.display='none';document.getElementById('menuOverlay').style.display='flex';ctx.fillStyle='#d4e0ea';ctx.fillRect(0,0,W,H);startMenuBg();}
function selectTower(t){if(!game)return;game.selType=game.selType===t?null:t;game.selTower=null;updateTB();}
function upgradeSelected(){
  if(!game||!game.selTower)return;const t=game.selTower;
  if(t.level>=3||game.gold<t.upgradeCost)return;
  game.gold-=t.upgradeCost;t.level++;game.score+=10;
  // reset build anim for upgrade
  t.buildScale=0.3;
  spawnBuildFX(game.particles,t.x,t.y,t.cfg.acc);
  sfxUpgrade();updateTB();
}
function sellSelected(){if(!game||!game.selTower)return;const t=game.selTower;game.gold+=t.sellValue;game.map[t.row][t.col]=0;game.towers=game.towers.filter(x=>x!==t);game.selTower=null;updateTB();}
function updateTB(){
  if(!game)return;
  ['MG','Fire','Ice'].forEach(t=>document.getElementById('btn'+t).classList.toggle('selected',game.selType===t));
  const sel=game.selTower,sb=document.getElementById('sellBtn'),ub=document.getElementById('upgradeBtn'),ht=document.getElementById('hint'),div=document.getElementById('towerActionDiv');
  if(sel){
    // Show tower action group with divider
    div.style.display='block';
    sb.style.display='inline-block';
    sb.textContent='× 賣出 (+'+sel.sellValue+'G)';
    if(sel.level<3){
      ub.style.display='inline-block';
      ub.textContent='▲ 升級 Lv'+sel.level+'→'+(sel.level+1)+' (-'+sel.upgradeCost+'G)';
      ub.style.opacity=game.gold>=sel.upgradeCost?'1':'0.4';
    } else {
      ub.style.display='none';
    }
    ht.textContent=TCFG[sel.type].name+' Lv'+sel.level+' | 傷害:'+sel.stats.dmg+' 射程:'+sel.stats.range.toFixed(1)+' 冷卻:'+sel.stats.rate;
  } else {
    div.style.display='none';
    sb.style.display='none';
    ub.style.display='none';
    ht.textContent=game.selType?'← 點擊空格建造塔':'← 選擇塔種後點空地建造';
  }
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
let mouseX=0,mouseY=0;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;});
canvas.addEventListener('click',e=>{
  if(!game||game.gameOver||game.victory)return;
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const col=Math.floor(mx/CELL),row=Math.floor(my/CELL);
  if(row<0||row>=ROWS||col<0||col>=COLS)return;
  const ct=game.towers.find(t=>t.col===col&&t.row===row);
  if(ct){game.selTower=game.selTower===ct?null:ct;game.selType=null;updateTB();return;}
  if(game.selType&&game.map[row][col]===0){
    const cfg=TCFG[game.selType];if(game.gold<cfg.cost){flashMsg='// 金幣不足';flashTimer=80;return;}
    game.gold-=cfg.cost;
    const tower=new Tower(col,row,game.selType);
    game.towers.push(tower);game.map[row][col]=4;game.score+=5;
    spawnBuildFX(game.particles,tower.x,tower.y,cfg.col);
    sfxBuild();updateTB();
  } else {game.selTower=null;updateTB();}
});

let flashMsg=null,flashTimer=0;
function loop(){
  if(!game)return;
  game.animFrame++;
  game.scanY=(game.scanY+0.8)%H;
  game.radarAngle=(game.radarAngle+0.007)%(Math.PI*2);

  // Spawn
  if(game.waveActive&&game.spawnQ.length>0){game.spawnTimer--;if(game.spawnTimer<=0){const s=game.spawnQ.shift();game.enemies.push(new Enemy(s.type,s.opts||{}));game.spawnTimer=game.spawnInterval;}}

  // Update enemies
  game.enemies.forEach(e=>{
    if(!e.dead&&!e.reached)e.update();
    else if(e.dying)e.update();
    if(e.reached&&!e.scored){e.scored=true;game.baseHP--;sfxBaseHit();if(game.baseHP<=0)game.gameOver=true;}
  });

  // Remove dead enemies after death anim completes
  game.enemies=game.enemies.filter(e=>{
    if(e.dead&&!e.dying)return false;
    if(e.dying&&e.dyingTimer>=e.dyingMax){
      // Reward on anim complete
      if(!e.rewarded){e.rewarded=true;game.gold+=e.reward;game.score+=e.reward;spawnFloat(game.floatTexts,e.x,e.y-20,'+'+e.reward+'G','#ffe000',12);sfxGold();}
      return false;
    }
    return true;
  });

  // startDeath triggers when hp<=0 — set dead immediately for targeting
  game.enemies.forEach(e=>{if(e.hp<=0&&!e.dying&&!e.dead){e.startDeath();sfxDeath(e.type);}});

  // Update towers+bullets
  game.towers.forEach(t=>t.update(game.enemies,game.bullets,game.particles));
  game.bullets.forEach(b=>b.update(game.enemies,game.particles,game.floatTexts));
  game.bullets=game.bullets.filter(b=>!b.dead);
  updateParticles(game.particles);
  updateFloats(game.floatTexts);

  // Wave end — only count enemies still alive (not dead, not dying, not reached)
  const aliveEnemies=game.enemies.filter(e=>!e.dead&&!e.dying&&!e.reached);
  if(game.waveActive&&game.spawnQ.length===0&&aliveEnemies.length===0){
    game.waveActive=false;
    if(game.waveIndex>=3){game.victory=true;}
    else{const nw=game.waveIndex+1;document.getElementById('waveBtn').disabled=false;document.getElementById('waveBtn').textContent='▶ 第 '+nw+' 波';setTimeout(()=>{if(game&&!game.waveActive&&!game.inCountdown&&!game.victory&&!game.gameOver)beginCD(nw);},300);}
  }

  // Draw
  ctx.save();
  ctx.translate(game.shakeX,game.shakeY);
  ctx.clearRect(-10,-10,W+20,H+20);
  drawMap(ctx,game.map,game);
  game.towers.forEach(t=>t.draw(ctx,t===game.selTower));
  game.enemies.forEach(e=>e.draw(ctx));
  game.bullets.forEach(b=>b.draw(ctx));
  drawParticles(ctx,game.particles);
  drawFloats(ctx,game.floatTexts);
  drawHUD(ctx,game);
  drawPreview(ctx,game,mouseX,mouseY);
  ctx.restore();

  // Flash message
  if(flashTimer>0){flashTimer--;ctx.save();ctx.globalAlpha=Math.min(1,flashTimer/18);ctx.shadowColor='#ff2244';ctx.shadowBlur=20;ctx.fillStyle='#ff4466';ctx.font='bold 13px "Share Tech Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(flashMsg,W/2,H/2-70);ctx.restore();}

  // End
  if(game.gameOver){drawMap(ctx,game.map,game);game.towers.forEach(t=>t.draw(ctx,false));drawHUD(ctx,game);saveHS(game.score);document.getElementById('gameoverScore').textContent='得分：'+game.score;document.getElementById('gameoverHS').textContent=fmtHS(getHS());document.getElementById('gameoverOverlay').style.display='flex';loopId=null;return;}
  if(game.victory){drawMap(ctx,game.map,game);game.towers.forEach(t=>t.draw(ctx,false));drawHUD(ctx,game);saveHS(game.score);document.getElementById('victoryScore').textContent='得分：'+game.score+'   金幣：'+game.gold;document.getElementById('victoryHS').textContent=fmtHS(getHS());document.getElementById('victoryOverlay').style.display='flex';loopId=null;return;}
  loopId=requestAnimationFrame(loop);
}

let tutCur=0;const tutDone=new Set();
function openTutorial(){tutCur=0;tutDone.clear();document.getElementById('tutOverlay').style.display='flex';tutRender();}
function closeTutorial(){document.getElementById('tutOverlay').style.display='none';}
function tutGo(d){tutDone.add(tutCur);const n=tutCur+d;if(n>=TUT.length){closeTutorial();return;}tutCur=Math.max(0,n);tutRender();}
function tutJump(i){tutDone.add(tutCur);tutCur=i;tutRender();}
function tutRender(){const s=TUT[tutCur];let nav='';TUT.forEach((_,i)=>{const cl=i===tutCur?'active':tutDone.has(i)?'done':'';nav+=`<div class="tut-dot ${cl}" onclick="tutJump(${i})">${tutDone.has(i)&&i!==tutCur?'✓':i+1}</div>`;if(i<TUT.length-1)nav+='<div class="tut-line"></div>';});document.getElementById('tutNav').innerHTML=nav;document.getElementById('tutBody').innerHTML=`<div class="tut-card"><div class="tut-step-header"><div class="tut-step-num">${tutCur+1}</div><div><p class="tut-step-title">${s.title}</p><p class="tut-step-sub">${s.sub}</p></div></div>${s.html}</div>`;document.getElementById('tutPrev').style.display=tutCur===0?'none':'inline-block';const nb=document.getElementById('tutNext');if(tutCur===TUT.length-1){nb.textContent='出發 ▶';nb.onclick=()=>closeTutorial();}else{nb.textContent='下一頁 ▶';nb.onclick=()=>tutGo(1);}}

// ── 主選單動態背景：浮動節點網絡 ──
let menuBgRAF=null;
function startMenuBg(){
  const cv=document.getElementById('menuBg');
  if(!cv)return;
  const mctx=cv.getContext('2d');
  function resize(){cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;}
  resize();
  // 節點
  const N=32, nodes=[];
  for(let i=0;i<N;i++){
    nodes.push({x:Math.random()*cv.width,y:Math.random()*cv.height,
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:1+Math.random()*2});
  }
  // 資料脈衝 (沿連線移動)
  const pulses=[];
  function frame(){
    if(!cv.offsetParent){menuBgRAF=null;return;} // 選單隱藏時停止
    if(cv.width!==cv.offsetWidth||cv.height!==cv.offsetHeight)resize();
    mctx.clearRect(0,0,cv.width,cv.height);
    // 更新節點
    nodes.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>cv.width)n.vx*=-1;
      if(n.y<0||n.y>cv.height)n.vy*=-1;
    });
    // 連線 (近距離)
    const maxD=130;
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
        const d=Math.hypot(dx,dy);
        if(d<maxD){
          const a=(1-d/maxD)*0.22;
          mctx.strokeStyle='rgba(0,130,190,'+a+')';mctx.lineWidth=0.8;
          mctx.beginPath();mctx.moveTo(nodes[i].x,nodes[i].y);mctx.lineTo(nodes[j].x,nodes[j].y);mctx.stroke();
          // 偶爾產生脈衝
          if(Math.random()<0.0006)pulses.push({a:i,b:j,t:0});
        }
      }
    }
    // 節點
    nodes.forEach(n=>{
      mctx.fillStyle='rgba(0,140,200,0.5)';mctx.shadowColor='#0099dd';mctx.shadowBlur=6;
      mctx.beginPath();mctx.arc(n.x,n.y,n.r,0,Math.PI*2);mctx.fill();
    });
    mctx.shadowBlur=0;
    // 脈衝移動
    for(let k=pulses.length-1;k>=0;k--){
      const p=pulses[k];p.t+=0.03;
      if(p.t>=1){pulses.splice(k,1);continue;}
      const na=nodes[p.a],nb=nodes[p.b];
      const px=na.x+(nb.x-na.x)*p.t, py=na.y+(nb.y-na.y)*p.t;
      mctx.fillStyle='rgba(0,200,255,0.8)';mctx.shadowColor='#00ccff';mctx.shadowBlur=8;
      mctx.beginPath();mctx.arc(px,py,2,0,Math.PI*2);mctx.fill();mctx.shadowBlur=0;
    }
    menuBgRAF=requestAnimationFrame(frame);
  }
  if(!menuBgRAF)frame();
}
// 主選單顯示時啟動 (頁面載入 + 返回選單)
startMenuBg();
